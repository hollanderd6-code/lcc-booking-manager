<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1A7A5E;
    --green-light: rgba(26,122,94,.1);
    --green-mid: rgba(26,122,94,.2);
    --bg: #F5F2EC;
    --card: #fff;
    --border: rgba(200,184,154,.4);
    --text: #0D1117;
    --muted: #7A8695;
    --danger: #DC2626;
    --danger-bg: rgba(220,38,38,.08);
    --amber: #D97706;
    --amber-bg: rgba(245,158,11,.1);
    --blue: #2563EB;
    --blue-bg: rgba(59,130,246,.1);
    --emerald: #059669;
    --emerald-bg: rgba(16,185,129,.1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .admin-header {
    background: #0D1117;
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .admin-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .admin-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    color: white;
  }
  .admin-logo span { color: #1A7A5E; }
  .admin-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    background: rgba(26,122,94,.25);
    color: #2AAE86;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(26,122,94,.3);
  }
  .admin-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,.5);
    text-decoration: none;
    transition: color .15s;
  }
  .admin-back-btn:hover { color: white; }

  /* ── Layout ── */
  .admin-body {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .admin-title-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .admin-title {
    font-family: 'Instrument Serif', serif;
    font-size: 30px;
    font-weight: 400;
    color: var(--text);
  }
  .admin-title em { font-style: italic; color: var(--green); }
  .admin-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .stat-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── Tabs ── */
  .tab-bar {
    display: flex;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
    width: fit-content;
  }
  .tab-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .tab-btn .count {
    font-size: 11px;
    background: rgba(13,17,23,.08);
    color: var(--muted);
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 700;
  }
  .tab-btn.active {
    background: var(--green);
    color: white;
  }
  .tab-btn.active .count {
    background: rgba(255,255,255,.25);
    color: white;
  }

  /* ── Cards liste ── */
  .items-list { display: flex; flex-direction: column; gap: 10px; }

  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: box-shadow .15s;
  }
  .item-card:hover { box-shadow: 0 4px 20px rgba(13,17,23,.07); }
  .item-card.pending { border-left: 3px solid var(--amber); }
  .item-card.published { border-left: 3px solid var(--green); }

  .item-card-body { flex: 1; min-width: 0; }
  .item-card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .item-card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .item-card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--muted);
  }
  .item-card-meta i { font-size: 11px; }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .status-pill.reflection { background: var(--amber-bg); color: var(--amber); }
  .status-pill.in_progress { background: var(--blue-bg); color: var(--blue); }
  .status-pill.available { background: var(--emerald-bg); color: var(--emerald); }
  .status-pill.pending { background: rgba(156,163,175,.15); color: #6B7280; }

  .votes-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 10px;
  }
  .votes-badge .up { color: var(--emerald); }
  .votes-badge .down { color: var(--danger); }

  /* ── Actions ── */
  .item-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  .action-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .action-btn:hover { background: var(--bg); }
  .action-btn.publish { background: var(--green); color: white; border-color: var(--green); }
  .action-btn.publish:hover { background: #15624B; }
  .action-btn.danger { color: var(--danger); border-color: rgba(220,38,38,.2); }
  .action-btn.danger:hover { background: var(--danger-bg); }

  /* ── Status select inline ── */
  .status-select {
    padding: 5px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
  }

  /* ── Modale création ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,17,23,.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 18px;
    padding: 28px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 24px 80px rgba(13,17,23,.2);
  }
  .modal-title {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    margin-bottom: 20px;
    color: var(--text);
  }
  .form-row { margin-bottom: 14px; }
  .form-row label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .form-row input,
  .form-row textarea,
  .form-row select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
  }
  .form-row textarea { resize: vertical; }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }
  .btn-cancel {
    padding: 9px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
  }
  .btn-save {
    padding: 9px 20px;
    border-radius: 10px;
    border: none;
    background: var(--green);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .btn-save:hover { background: #15624B; }

  /* ── Empty ── */
  .empty-state {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state i {
    font-size: 32px;
    color: #D1D5DB;
    display: block;
    margin-bottom: 12px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #0D1117;
    color: white;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 8px;
    transform: translateY(80px);
    opacity: 0;
    transition: all .25s;
    box-shadow: 0 8px 32px rgba(0,0,0,.25);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success i { color: #10B981; }
  .toast.error i { color: #EF4444; }

  @media(max-width: 768px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .item-card { flex-direction: column; }
    .item-actions { flex-direction: row; flex-wrap: wrap; }
    .admin-body { padding: 20px 16px 80px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="admin-header">
  <div class="admin-header-left">
    <span class="admin-logo">Boosting<span>host</span></span>
    <span class="admin-badge">Admin</span>
  </div>
  <a href="/help.html" class="admin-back-btn">
    <i class="fas fa-arrow-left"></i> Retour à la page support
  </a>
</header>

<!-- Body -->
<div class="admin-body">

  <div class="admin-title-row">
    <div>
      <h1 class="admin-title">Roadmap &amp; <em>suggestions</em></h1>
      <p class="admin-subtitle">Gérez les suggestions utilisateurs et la roadmap publique</p>
    </div>
    <button class="action-btn publish" onclick="openCreateModal()" style="padding:10px 18px;font-size:13px;">
      <i class="fas fa-plus"></i> Créer un item
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(156,163,175,.1);color:#6B7280;"><i class="fas fa-inbox"></i></div>
      <div><div class="stat-value" id="statPending">—</div><div class="stat-label">En attente</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--amber-bg);color:var(--amber);"><i class="fas fa-lightbulb"></i></div>
      <div><div class="stat-value" id="statReflection">—</div><div class="stat-label">En réflexion</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--blue-bg);color:var(--blue);"><i class="fas fa-hammer"></i></div>
      <div><div class="stat-value" id="statInProgress">—</div><div class="stat-label">En cours</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--emerald-bg);color:var(--emerald);"><i class="fas fa-check-circle"></i></div>
      <div><div class="stat-value" id="statAvailable">—</div><div class="stat-label">Disponible</div></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('pending', this)">
      <i class="fas fa-clock"></i> En attente <span class="count" id="countPending">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('published', this)">
      <i class="fas fa-globe"></i> Publiés <span class="count" id="countPublished">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('all', this)">
      <i class="fas fa-list"></i> Tout
    </button>
  </div>

  <!-- Liste -->
  <div class="items-list" id="itemsList">
    <div class="empty-state"><i class="fas fa-circle-notch fa-spin"></i>Chargement…</div>
  </div>

</div>

<!-- Modale création / édition -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Créer un item</div>
    <div class="form-row">
      <label>Titre *</label>
      <input id="formTitle" type="text" placeholder="Ex : Intégration Google Calendar"/>
    </div>
    <div class="form-row">
      <label>Description</label>
      <textarea id="formDesc" rows="3" placeholder="Décrivez la fonctionnalité…"></textarea>
    </div>
    <div class="form-row">
      <label>Statut</label>
      <select id="formStatus">
        <option value="reflection">💡 En réflexion</option>
        <option value="in_progress">🔨 En cours</option>
        <option value="available">✅ Disponible</option>
      </select>
    </div>
    <div class="form-row">
      <label>Publier immédiatement</label>
      <select id="formPublished">
        <option value="false">Non — garder en brouillon</option>
        <option value="true">Oui — visible par tous</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveItem()"><i class="fas fa-save"></i> Enregistrer</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>

<script>
const API = window.location.origin;
let allItems = [];
let currentTab = 'pending';
let editingId = null;

// ── Auth ──
function getToken() {
  return new URLSearchParams(window.location.search).get('token') || localStorage.getItem('lcc_token');
}

// ── Toast ──
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  const icon = t.querySelector('i');
  t.className = 'toast ' + type;
  icon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Chargement ──
async function loadItems() {
  try {
    const token = getToken();
    if (!token) { window.location.href = '/login.html'; return; }
    const res = await fetch(`${API}/api/admin/roadmap`, {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (res.status === 401) { window.location.href = '/login.html'; return; }
    if (!res.ok) throw new Error();
    const data = await res.json();
    allItems = data.items || [];
    updateStats();
    renderList();
  } catch(e) {
    document.getElementById('itemsList').innerHTML =
      '<div class="empty-state"><i class="fas fa-exclamation-circle"></i>Erreur de chargement. Vérifiez que vous êtes bien connecté.</div>';
  }
}

function updateStats() {
  const pending = allItems.filter(i => !i.is_published).length;
  const reflection = allItems.filter(i => i.is_published && i.status === 'reflection').length;
  const inProgress = allItems.filter(i => i.is_published && i.status === 'in_progress').length;
  const available = allItems.filter(i => i.is_published && i.status === 'available').length;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statReflection').textContent = reflection;
  document.getElementById('statInProgress').textContent = inProgress;
  document.getElementById('statAvailable').textContent = available;
  document.getElementById('countPending').textContent = pending;
  document.getElementById('countPublished').textContent = allItems.filter(i => i.is_published).length;
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('itemsList');
  let items = allItems;
  if (currentTab === 'pending') items = allItems.filter(i => !i.is_published);
  if (currentTab === 'published') items = allItems.filter(i => i.is_published);

  if (!items.length) {
    list.innerHTML = `<div class="empty-state">
      <i class="fas fa-inbox"></i>
      ${currentTab === 'pending' ? 'Aucune suggestion en attente 🎉' : 'Aucun item publié pour le moment.'}
    </div>`;
    return;
  }

  const statusLabels = { reflection: '💡 En réflexion', in_progress: '🔨 En cours', available: '✅ Disponible' };

  list.innerHTML = items.map(item => `
    <div class="item-card ${item.is_published ? 'published' : 'pending'}" id="card-${item.id}">
      <div class="item-card-body">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
          ${item.is_published
            ? `<span class="status-pill ${item.status}">${statusLabels[item.status] || item.status}</span>`
            : `<span class="status-pill pending">⏳ En attente de validation</span>`
          }
          ${item.upvotes || item.downvotes ? `
            <span class="votes-badge">
              <span class="up">👍 ${item.upvotes || 0}</span>
              <span class="down">👎 ${item.downvotes || 0}</span>
            </span>` : ''}
        </div>
        <div class="item-card-title">${item.title}</div>
        ${item.description ? `<div class="item-card-desc">${item.description}</div>` : ''}
        <div class="item-card-meta">
          ${item.suggested_by_name ? `<span><i class="fas fa-user"></i> Suggéré par <strong>${item.suggested_by_name}</strong></span>` : '<span><i class="fas fa-shield-halved"></i> Créé par admin</span>'}
          <span><i class="fas fa-calendar"></i> ${new Date(item.created_at).toLocaleDateString('fr-FR')}</span>
        </div>
      </div>
      <div class="item-actions">
        ${!item.is_published ? `
          <button class="action-btn publish" onclick="quickPublish(${item.id})">
            <i class="fas fa-globe"></i> Publier
          </button>` : `
          <select class="status-select" onchange="changeStatus(${item.id}, this.value)">
            <option value="reflection" ${item.status==='reflection'?'selected':''}>💡 En réflexion</option>
            <option value="in_progress" ${item.status==='in_progress'?'selected':''}>🔨 En cours</option>
            <option value="available" ${item.status==='available'?'selected':''}>✅ Disponible</option>
          </select>
          <button class="action-btn" onclick="unpublish(${item.id})">
            <i class="fas fa-eye-slash"></i> Dépublier
          </button>`
        }
        <button class="action-btn" onclick="openEditModal(${item.id})">
          <i class="fas fa-pen"></i> Modifier
        </button>
        <button class="action-btn danger" onclick="deleteItem(${item.id})">
          <i class="fas fa-trash"></i> Supprimer
        </button>
      </div>
    </div>
  `).join('');
}

// ── Actions ──
async function quickPublish(id) {
  await updateItem(id, { is_published: true });
  showToast('Item publié et visible par tous !');
}

async function unpublish(id) {
  await updateItem(id, { is_published: false });
  showToast('Item dépublié.');
}

async function changeStatus(id, status) {
  await updateItem(id, { status });
  showToast('Statut mis à jour.');
}

async function updateItem(id, payload) {
  try {
    const token = getToken();
    const res = await fetch(`${API}/api/admin/roadmap/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error();
    // Mettre à jour localement
    const idx = allItems.findIndex(i => i.id === id);
    if (idx !== -1) allItems[idx] = { ...allItems[idx], ...payload };
    updateStats();
    renderList();
  } catch(e) {
    showToast('Erreur lors de la mise à jour.', 'error');
  }
}

async function deleteItem(id) {
  if (!confirm('Supprimer cet item définitivement ?')) return;
  try {
    const token = getToken();
    const res = await fetch(`${API}/api/admin/roadmap/${id}`, {
      method: 'DELETE',
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!res.ok) throw new Error();
    allItems = allItems.filter(i => i.id !== id);
    updateStats();
    renderList();
    showToast('Item supprimé.');
  } catch(e) {
    showToast('Erreur lors de la suppression.', 'error');
  }
}

// ── Modale ──
function openCreateModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Créer un item';
  document.getElementById('formTitle').value = '';
  document.getElementById('formDesc').value = '';
  document.getElementById('formStatus').value = 'reflection';
  document.getElementById('formPublished').value = 'false';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Modifier l\'item';
  document.getElementById('formTitle').value = item.title || '';
  document.getElementById('formDesc').value = item.description || '';
  document.getElementById('formStatus').value = item.status || 'reflection';
  document.getElementById('formPublished').value = item.is_published ? 'true' : 'false';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

async function saveItem() {
  const title = document.getElementById('formTitle').value.trim();
  if (!title) { document.getElementById('formTitle').focus(); return; }
  const payload = {
    title,
    description: document.getElementById('formDesc').value.trim() || null,
    status: document.getElementById('formStatus').value,
    is_published: document.getElementById('formPublished').value === 'true'
  };
  try {
    const token = getToken();
    if (editingId) {
      const res = await fetch(`${API}/api/admin/roadmap/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error();
      const idx = allItems.findIndex(i => i.id === editingId);
      if (idx !== -1) allItems[idx] = { ...allItems[idx], ...payload };
      showToast('Item modifié.');
    } else {
      // Création via suggest puis publication auto si demandé
      const res = await fetch(`${API}/api/roadmap/suggest`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ title: payload.title, description: payload.description })
      });
      if (!res.ok) throw new Error();
      // Recharger pour récupérer le nouvel id
      await loadItems();
      // Si publication immédiate, trouver le dernier item et le publier
      if (payload.is_published) {
        const last = allItems.sort((a,b) => b.id - a.id)[0];
        if (last) await updateItem(last.id, { status: payload.status, is_published: true });
      }
      showToast('Item créé !');
    }
    closeModal();
    updateStats();
    renderList();
  } catch(e) {
    showToast('Erreur lors de la sauvegarde.', 'error');
  }
}

// Fermer modale en cliquant l'overlay
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// Init
loadItems();
</script>
