<!DOCTYPE html>
<html data-theme="light" lang="fr" data-theme-v3="1">
<head>
<meta charset="utf-8"/>
<meta content="no-store, no-cache, must-revalidate, max-age=0" http-equiv="Cache-Control"/>
<meta content="no-cache" http-equiv="Pragma"/>
<meta content="0" http-equiv="Expires"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Boostinghost – Revenus</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="/css/style.css" rel="stylesheet"/>
<link href="/css/bh-theme-v3.css" rel="stylesheet"/>
<link href="/css/bh-shared.css?v=1" rel="stylesheet"/>
<link href="/css/bottom-bar-enhanced.css" rel="stylesheet"/>
<link href="/css/tablet-bottom-bar-fix.css" rel="stylesheet"/>
<link href="/css/menu-plus-fixes.css" rel="stylesheet"/>
<link href="/css/menu-active-button.css" rel="stylesheet"/>
<link href="/css/messages-badge-fix.css" rel="stylesheet"/>
<link href="/css/messages-badge-red.css" rel="stylesheet"/>
<link href="/css/messages-badge-desktop.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="/css/mobile-native-styles.css">
<style>
html, body { margin: 0 !important; }
.app-container { margin-top: 0 !important; }

/* ── Variables ── */
:root {
  --primary: #1A7A5E;
  --primary-light: rgba(26,122,94,.08);
  --primary-mid: rgba(26,122,94,.18);
  --bg: #F5F2EC;
  --border: #E8E0D0;
  --text: #0D1117;
  --text-muted: #6B7280;
  --text-soft: #9CA3AF;
}

/* ── Stats row (même pattern que factures) ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
@media (max-width: 900px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 500px) { .stats-row { grid-template-columns: 1fr; } }

.stat-card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--kpi-accent, var(--primary));
}
.stat-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: var(--kpi-bg, var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: var(--kpi-accent, var(--primary));
  margin-bottom: 12px;
}
.stat-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 6px;
}
.stat-value {
  display: block;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.4px;
}
.stat-sub {
  display: block;
  font-size: 12px;
  color: var(--primary);
  margin-top: 5px;
}

/* ── Contrôles ── */
.reporting-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 24px;
  padding: 14px 18px;
  background: white;
  border-radius: 14px;
  border: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.ctrl-select {
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  outline: none;
  min-width: 140px;
}
.ctrl-label {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
}
.btn-export {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 16px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 9px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-export:hover { opacity: .88; }
.btn-csv {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 14px;
  background: white;
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}
.ml-auto { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* ── Cards ── */
.card {
  background: white;
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
  overflow: hidden;
  margin-bottom: 16px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.card-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.card-title i { color: var(--primary); font-size: 13px; }

/* ── Grid layouts ── */
.grid-2-1 {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 900px) { .grid-2-1 { grid-template-columns: 1fr; } }

/* ── Tabs ── */
.view-tabs {
  display: flex; gap: 3px;
  background: var(--bg);
  border-radius: 9px;
  padding: 3px;
  border: 1px solid var(--border);
}
.view-tab {
  padding: 5px 12px;
  border-radius: 7px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  transition: all .12s;
}
.view-tab.active {
  background: white; color: var(--primary);
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}

/* ── Graphiques ── */
.chart-wrap { position: relative; height: 250px; padding: 16px 20px 20px; }
.chart-mini { position: relative; height: 170px; padding: 14px 20px 16px; }

/* ── Plateforme ── */
.platform-list { padding: 12px 20px; display: flex; flex-direction: column; gap: 10px; }
.platform-row { display: flex; align-items: center; gap: 10px; }
.platform-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.platform-name { flex: 1; font-size: 13px; font-weight: 500; }
.platform-bar-wrap { flex: 2; height: 5px; background: var(--bg); border-radius: 99px; overflow: hidden; }
.platform-bar { height: 100%; border-radius: 99px; }
.platform-pct { font-size: 12px; font-weight: 700; color: var(--text-muted); min-width: 34px; text-align: right; }
.platform-rev { font-size: 12px; color: var(--text-soft); min-width: 72px; text-align: right; }

/* ── Table propriétés ── */
.prop-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.prop-table th {
  padding: 9px 16px;
  text-align: right;
  font-size: 11px; font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .4px;
  border-bottom: 2px solid var(--border);
  background: var(--bg);
  white-space: nowrap;
}
.prop-table th:first-child { text-align: left; }
.prop-table td {
  padding: 12px 16px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  white-space: nowrap;
}
.prop-table td:first-child { text-align: left; }
.prop-table tr:last-child td { border-bottom: none; }
.prop-table tr:hover td { background: var(--bg); }
.prop-table tfoot td {
  font-weight: 700; background: var(--primary-light);
  color: var(--primary); border-top: 2px solid var(--primary-mid);
  border-bottom: none;
}

/* ── Table mensuelle ── */
.monthly-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.monthly-table th {
  padding: 9px 16px; text-align: right;
  font-size: 11px; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px;
  border-bottom: 2px solid var(--border);
  background: var(--bg);
  white-space: nowrap;
}
.monthly-table th:first-child { text-align: left; }
.monthly-table td {
  padding: 11px 16px; text-align: right;
  border-bottom: 1px solid var(--border); color: var(--text);
  white-space: nowrap;
}
.monthly-table td:first-child { text-align: left; font-weight: 600; }
.monthly-table tr:last-child td { border-bottom: none; }
.monthly-table tr:hover td { background: var(--bg); }
.monthly-table tfoot td {
  font-weight: 700; background: var(--primary-light);
  color: var(--primary); border-top: 2px solid var(--primary-mid); border-bottom: none;
}
.zero { color: var(--text-soft) !important; font-weight: 400 !important; }

/* ── Section conciergerie ── */
.concierge-section {
  background: linear-gradient(135deg, rgba(26,122,94,.06), rgba(26,122,94,.02));
  border: 1.5px solid rgba(26,122,94,.2);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}
.concierge-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
}
.concierge-title {
  font-size: 15px; font-weight: 700; color: var(--primary);
  display: flex; align-items: center; gap: 8px;
}
.concierge-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
@media (max-width: 600px) { .concierge-grid { grid-template-columns: 1fr 1fr; } }
.concierge-kpi {
  background: white; border-radius: 12px; padding: 14px 16px;
  border: 1px solid rgba(26,122,94,.15);
}
.concierge-kpi-value { font-size: 19px; font-weight: 700; color: var(--primary); }
.concierge-kpi-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }

/* ── Loading ── */
.loading-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 20px; gap: 14px; color: var(--text-muted);
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border); border-top-color: var(--primary);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Occupancy badge ── */
.occ-badge {
  display: inline-flex; align-items: center;
  padding: 3px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 700;
}

html[data-theme-v3="1"] .main-content { background: #F5F2EC !important; }

/* ── Layout plein écran (copie exacte de factures-proprietaires) ── */
.app-container { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: white; border-right: 1px solid #e5e7eb; position: fixed; top: 0; bottom: 0; left: 0; z-index: 50; display: flex; flex-direction: column; }
.main-wrapper { flex: 1; margin-left: 260px; display: flex; flex-direction: column; min-width: 0; }
.top-bar { background: white; height: 64px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: flex-end; padding: 0 32px; position: sticky; top: 0; z-index: 40; }
html[data-theme-v3="1"] .main-content { padding: 24px !important; max-width: 1400px !important; margin: 0 auto !important; width: 100% !important; box-sizing: border-box !important; }

/* ── Hauteurs corrigées pour dark bar + header fixe ── */
html[data-theme-v3="1"] .app-container {
  height: calc(100vh - 40px) !important;
  overflow: hidden !important;
  margin-top: 40px !important;
}
html[data-theme-v3="1"] .main-wrapper {
  height: 100% !important;
  overflow: hidden !important;
}
html[data-theme-v3="1"] main.main-content {
  overflow-y: auto !important;
  height: 100% !important;
  background: #F5F2EC !important;
}
@media (min-width: 1367px) {
  html[data-theme-v3="1"] main.main-content {
    padding-top: 70px !important;
  }
}

/* ── Dark bar ── */
html[data-theme-v3="1"] .sidebar {
  position: fixed !important; top: 40px !important;
  left: 0 !important; bottom: 0 !important;
  height: auto !important; z-index: 30 !important;
}

/* ── BARRE DARK EN HAUT ── */
html[data-theme-v3="1"] .bh-demo-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
  background: #0D1117; display: flex; align-items: center; gap: 6px;
  padding: 0 16px; height: 40px; font-family: 'DM Sans', sans-serif; font-size: 12px;
}
.bh-demo-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.bh-demo-mode-label { color: rgba(255,255,255,.4); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; }
.bh-theme-toggle {
  width: 36px; height: 20px; border-radius: 999px; border: 1px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.1); cursor: pointer; position: relative; transition: all .2s;
}
.bh-theme-toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px;
  border-radius: 50%; background: rgba(255,255,255,.7); transition: all .2s;
}
[data-theme="dark"] .bh-theme-toggle { background: rgba(26,122,94,.5); border-color: rgba(26,122,94,.8); }
[data-theme="dark"] .bh-theme-toggle::after { transform: translateX(16px); background: white; }

/* ── Header dark top ── */
html[data-theme-v3="1"] header.main-header { position: fixed !important; top: 40px !important; left: 0 !important; right: 0 !important; z-index: 50 !important; margin-left: 260px !important; }
@media(max-width:1366px){ html[data-theme-v3="1"] header.main-header { margin-left: 0 !important; } }
html[data-theme-v3="1"] .header-actions .btn-ghost,
html[data-theme-v3="1"] .header-actions .btn.btn-ghost { display: none !important; }

/* ── Boutons fixes en haut à droite ── */
.rp-header-btns { position: fixed; top: calc(40px + 13px); right: 24px; z-index: 200; display: flex; gap: 10px; align-items: center; }
.rp-btn-back {
  display: inline-flex; align-items: center; gap: 8px;
  height: 40px; padding: 0 20px; border: none;
  border-radius: 12px; background: #1A7A5E;
  color: white; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s;
  white-space: nowrap;
}
.rp-btn-back:hover { background: #15624B; }

/* ── Desktop: bouton retour fixe ── */
@media(max-width:1366px){
  .main-wrapper { margin-left: 0 !important; }
  .rp-header-btns { display: none; }
}
</style>
</head>

<body data-back-href="/app.html" data-back-label="Retour au dashboard" data-kicker="Facturation" data-page="reporting" data-subtitle="Analyse de vos performances financières" data-title="Revenus">

<!-- MOBILE HEADER -->
<div class="mobile-header" style="display:none!important;">
<a class="mobile-logo" href="/app.html">
<i class="fas fa-chart-bar"></i>
<span class="mobile-logo-text">Revenus</span>
</a>
<button class="mobile-menu-btn" id="mobileMenuBtn">
<i class="fas fa-bars"></i>
</button>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-container">
<div id="bhSidebar"></div>
<div class="main-wrapper">
<header class="top-bar"></header>
<main class="main-content">
<div id="bhHeader"></div>

<!-- Bouton retour fixe en haut à droite -->
<div class="rp-header-btns">
  <button class="rp-btn-back" onclick="window.location.href='/app.html'"><i class="fas fa-arrow-left"></i> Tableau de bord</button>
</div>

<!-- Contrôles -->
<div class="reporting-controls">
  <select class="ctrl-select" id="yearSelect" onchange="loadReport()"></select>
  <select class="ctrl-select" id="propertySelect" onchange="loadReport()">
    <option value="">Tous les logements</option>
  </select>
  <span class="ctrl-label" id="reportSubtitle"></span>
  <div class="ml-auto">
    <button class="btn-csv" onclick="exportCSV()"><i class="fas fa-download"></i> CSV</button>
    <button class="btn-export" onclick="exportConcierge()"><i class="fas fa-handshake"></i> Export conciergerie</button>
    <button class="btn-export" onclick="showExportComptaModal()" style="background:#1A7A5E;">
      <i class="fas fa-file-csv"></i> Export comptable
    </button>
  </div>
</div>

<!-- Modal Export Comptable -->
<div id="exportComptaModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(13,17,23,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
  <div style="background:white;border-radius:20px;padding:32px;max-width:420px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,.18);">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <div style="width:44px;height:44px;border-radius:11px;background:#f0fdf4;display:flex;align-items:center;justify-content:center;font-size:20px;">📊</div>
      <div>
        <div style="font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:#0D1117;">Export comptable</div>
        <div style="font-size:12px;color:#7A8695;">Fichier CSV estampillé Boostinghost</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
      <div>
        <label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;">Mois</label>
        <select id="exportMonth" style="width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;background:#fafaf8;">
          <option value="">Toute l'année</option>
          <option value="1">Janvier</option><option value="2">Février</option>
          <option value="3">Mars</option><option value="4">Avril</option>
          <option value="5">Mai</option><option value="6">Juin</option>
          <option value="7">Juillet</option><option value="8">Août</option>
          <option value="9">Septembre</option><option value="10">Octobre</option>
          <option value="11">Novembre</option><option value="12">Décembre</option>
        </select>
      </div>
      <div>
        <label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;">Année</label>
        <select id="exportYear" style="width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;background:#fafaf8;">
        </select>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px;">
      <button onclick="downloadExport('reservations')" style="display:flex;align-items:center;gap:10px;padding:13px 18px;border:1.5px solid #e5e7eb;border-radius:12px;background:#fafaf8;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:#0D1117;text-align:left;transition:border-color .15s;" onmouseover="this.style.borderColor='#1A7A5E'" onmouseout="this.style.borderColor='#e5e7eb'">
        <span style="font-size:22px;">🏠</span>
        <div>
          <div>Export Réservations</div>
          <div style="font-size:11px;color:#7A8695;font-weight:400;">Date, logement, voyageur, plateforme, montants</div>
        </div>
        <i class="fas fa-download" style="margin-left:auto;color:#1A7A5E;"></i>
      </button>
      <button onclick="downloadExport('invoices')" style="display:flex;align-items:center;gap:10px;padding:13px 18px;border:1.5px solid #e5e7eb;border-radius:12px;background:#fafaf8;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:#0D1117;text-align:left;transition:border-color .15s;" onmouseover="this.style.borderColor='#1A7A5E'" onmouseout="this.style.borderColor='#e5e7eb'">
        <span style="font-size:22px;">📄</span>
        <div>
          <div>Export Factures propriétaires</div>
          <div style="font-size:11px;color:#7A8695;font-weight:400;">Numéro, client, HT, TVA, TTC, statut</div>
        </div>
        <i class="fas fa-download" style="margin-left:auto;color:#1A7A5E;"></i>
      </button>
    </div>

    <button onclick="closeExportComptaModal()" style="width:100%;padding:11px;border:1.5px solid #e5e7eb;border-radius:12px;background:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:#374151;cursor:pointer;">Fermer</button>
  </div>
</div>

<!-- Loading -->
<div id="loadingState" class="loading-state">
  <div class="spinner"></div>
  <div>Chargement des données...</div>
</div>

<!-- Contenu -->
<div id="reportContent" style="display:none;">

  <!-- KPI -->
  <div class="stats-row" id="kpiGrid"></div>

  <!-- Conciergerie (conditionnel) -->
  <div class="concierge-section" id="conciergeSection" style="display:none;">
    <div class="concierge-header">
      <div class="concierge-title"><i class="fas fa-handshake"></i> Données conciergerie</div>
      <button class="btn-export" onclick="exportConcierge()" style="font-size:12px;padding:7px 14px;">
        <i class="fas fa-file-csv"></i> Exporter pour la compta
      </button>
    </div>
    <div class="concierge-grid" id="conciergeGrid"></div>
  </div>

  <!-- Graphiques -->
  <div class="grid-2-1">
    <div class="card">
      <div class="card-header">
        <div class="card-title"><i class="fas fa-chart-bar"></i> Revenus par mois</div>
        <div class="view-tabs">
          <button class="view-tab active" onclick="switchChart('gross',this)">Brut</button>
          <button class="view-tab" onclick="switchChart('net',this)">Net</button>

      </div>

    </div>

    <div class="card-header">
      <div class="card-title"><i class="fas fa-home"></i> Par logement</div>
    </div>

    </div>

  <!-- Tableau mensuel -->

<script>
const API_URL = 'https://lcc-booking-manager.onrender.com';
let _data = null;
let _chartBar = null;
let _chartPie = null;
let _chartMode = 'gross';

const PLATFORM_COLORS = {
  'Airbnb': '#FF5A5F', 'Booking.com': '#003580',
  'Expedia': '#FFC72C', 'Vrbo': '#1A5276', 'Direct': '#1A7A5E',
  'Bloqué': '#9CA3AF', 'Direct': '#1A7A5E'
};

// Normalise les noms de plateforme
function normalizePlatform(name) {
  if (!name) return name;
  const n = name.toLowerCase();
  if (n === 'block' || n === 'bloqué' || n === 'blocked') return 'Bloqué';
  if (n === 'manuel' || n === 'manual' || n === 'direct') return 'Direct';
  return name;
}
const FALLBACK_COLORS = ['#6366f1','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899'];

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const sel = document.getElementById('yearSelect');
  if (!sel) { console.error('yearSelect introuvable'); return; }
  const y = new Date().getFullYear();
  for (let i = y; i >= y - 3; i--) {
    const o = document.createElement('option');
    o.value = i; o.textContent = i;
    if (i === y) o.selected = true;
    sel.appendChild(o);
  }
  await fetchProperties();
  await loadReport();
});

async function fetchProperties() {
  try {
    const r = await fetch(`${API_URL}/api/properties`, {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('lcc_token') }
    });
    if (!r.ok) return;
    const d = await r.json();
    const sel = document.getElementById('propertySelect');
    (d.properties || []).forEach(p => {
      const o = document.createElement('option');
      o.value = p.id; o.textContent = p.name;
      sel.appendChild(o);
    });
  } catch(e) {}
}

async function loadReport() {
  const year   = document.getElementById('yearSelect').value;
  const propId = document.getElementById('propertySelect').value;
  const token  = localStorage.getItem('lcc_token');

  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('reportContent').style.display = 'none';

  try {
    let url = `${API_URL}/api/reporting?year=${year}`;
    if (propId) url += `&property_id=${propId}`;
    const r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
    if (!r.ok) throw new Error('Erreur ' + r.status);
    _data = await r.json();
    render(_data);
  } catch(e) {
    document.getElementById('loadingState').innerHTML = `
      <i class="fas fa-exclamation-circle" style="font-size:32px;color:#dc2626;"></i>
      <div style="font-weight:600;">Erreur de chargement</div>
      <div style="font-size:12px;color:#9CA3AF;">${e.message}</div>
    `;
  }
}

// ── Formatters ────────────────────────────────────────────────
const fmt   = n => n == null || isNaN(n) ? '—' : new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(n) + ' €';
const fmtN  = n => new Intl.NumberFormat('fr-FR').format(n || 0);

// ── Render ────────────────────────────────────────────────────
function render(d) {
  const s = d.summary || {};

  document.getElementById('reportSubtitle').textContent =
    `${d.year} · ${fmtN(s.totalBookings)} réservation${s.totalBookings > 1 ? 's' : ''} · ${fmtN(s.totalNights)} nuits`;

  renderKPIs(s);
  renderConcierge(d);
  renderBarChart(d.monthly, _chartMode);
  renderPieChart(d.platforms);
  renderPropTable(d.byProperty);
  renderMonthlyTable(d.monthly, d.byProperty);

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('reportContent').style.display = 'block';
}

function renderKPIs(s) {
  const cards = [
    { label:'CA Brut', value: fmt(s.totalGrossRevenue), sub:`dont ${fmt(s.totalCleaningFee)} ménage`, accent:'#1A7A5E', bg:'rgba(26,122,94,.08)', icon:'fa-euro-sign' },
    { label:'Revenu net', value: fmt(s.totalNetRevenue), sub:`Taxe séjour : ${fmt(s.totalTouristTax)}`, accent:'#3b82f6', bg:'rgba(59,130,246,.08)', icon:'fa-wallet' },
    { label:'Revenu propriétaire', value: fmt(s.totalOwnerRevenue), sub:`Conciergerie : ${fmt(s.totalConcierge)}`, accent:'#8b5cf6', bg:'rgba(139,92,246,.08)', icon:'fa-home' },
    { label:'Réservations', value: fmtN(s.totalBookings), sub:`Moy. ${s.avgNightsPerBooking || 0} nuits / séjour`, accent:'#f59e0b', bg:'rgba(245,158,11,.08)', icon:'fa-calendar-check' }
  ];
  document.getElementById('kpiGrid').innerHTML = cards.map(c => `
    <div class="stat-card" style="--kpi-accent:${c.accent};--kpi-bg:${c.bg};">
      <div class="stat-icon"><i class="fas ${c.icon}"></i></div>
      <span class="stat-label">${c.label}</span>
      <span class="stat-value">${c.value}</span>
      <span class="stat-sub">${c.sub}</span>
    </div>
  `).join('');
}

function renderConcierge(d) {
  const s = d.summary || {};
  const has = d.byProperty && d.byProperty.some(p => p.conciergePct > 0);
  const sec = document.getElementById('conciergeSection');
  if (!has || !s.totalConcierge) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('conciergeGrid').innerHTML = `
    <div class="concierge-kpi">
      <div class="concierge-kpi-value">${fmt(s.totalConcierge)}</div>
      <div class="concierge-kpi-label">Commission totale</div>
    </div>
    <div class="concierge-kpi">
      <div class="concierge-kpi-value">${fmt(s.totalOwnerRevenue)}</div>
      <div class="concierge-kpi-label">Versé au propriétaire</div>
    </div>
    <div class="concierge-kpi">
      <div class="concierge-kpi-value">${fmtN(s.totalBookings)}</div>
      <div class="concierge-kpi-label">Séjours gérés</div>
    </div>
    ${(d.byProperty||[]).filter(p=>p.conciergePct>0).map(p=>`
      <div class="concierge-kpi">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;"></div>
          <div style="font-size:12px;font-weight:600;color:#374151;">${p.name}</div>
        </div>
        <div class="concierge-kpi-value" style="font-size:16px;">${fmt(p.conciergeAmount)}</div>
        <div class="concierge-kpi-label">${p.conciergePct}% sur ${fmt(p.grossRevenue)}</div>
      </div>
    `).join('')}
  `;
}

function renderBarChart(monthly, type) {
  const labels = monthly.map(m => m.label);
  const map = { gross: monthly.map(m=>m.grossRevenue), net: monthly.map(m=>m.netRevenue), owner: monthly.map(m=>m.ownerRevenue) };
  const cols = { gross:'#1A7A5E', net:'#3b82f6', owner:'#8b5cf6' };
  const vals = map[type] || map.gross;
  const col  = cols[type] || '#1A7A5E';

  if (_chartBar) _chartBar.destroy();
  _chartBar = new Chart(document.getElementById('monthlyChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: vals,
        backgroundColor: col + '25',
        borderColor: col,
        borderWidth: 2,
        borderRadius: 7,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{ display:false }, tooltip:{ callbacks:{ label: c => fmt(c.raw) }}},
      scales: {
        x: { grid:{ display:false }, ticks:{ font:{ family:'DM Sans', size:11 }, color:'#9CA3AF' }},
        y: { grid:{ color:'rgba(0,0,0,.04)' }, ticks:{ font:{ family:'DM Sans', size:11 }, color:'#9CA3AF', callback: v => v===0?'0':(v>=1000?(v/1000).toFixed(0)+'k€':v+'€') }}
      }
    }
  });
}

function switchChart(type, btn) {
  _chartMode = type;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (_data) renderBarChart(_data.monthly, type);
}

function renderPieChart(platforms) {
  if (!platforms || !platforms.length) return;
  // Normaliser les noms
  platforms = platforms.map(p => ({ ...p, name: normalizePlatform(p.name) }));
  const labels = platforms.map(p => p.name);
  const vals   = platforms.map(p => p.bookings);
  const colors = platforms.map((p,i) => PLATFORM_COLORS[p.name] || FALLBACK_COLORS[i % FALLBACK_COLORS.length]);

  if (_chartPie) _chartPie.destroy();
  _chartPie = new Chart(document.getElementById('platformChart').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: vals, backgroundColor: colors.map(c=>c+'CC'), borderColor: colors, borderWidth: 2, hoverOffset: 5 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '68%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${c.label}: ${c.raw} rés. (${platforms[c.dataIndex]?.pct||0}%)` }}
      }
    }
  });

  document.getElementById('platformList').innerHTML = platforms.map((p,i) => {
    const col = PLATFORM_COLORS[p.name] || FALLBACK_COLORS[i % FALLBACK_COLORS.length];
    return `
      <div class="platform-row">
        <div class="platform-dot" style="background:${col};"></div>
        <div class="platform-name">${p.name}</div>
        <div class="platform-bar-wrap"><div class="platform-bar" style="width:${p.pct}%;background:${col};"></div></div>
        <div class="platform-pct">${p.pct}%</div>
        <div class="platform-rev">${fmt(p.revenue)}</div>
      </div>
    `;
  }).join('');
}

function renderPropTable(props) {
  if (!props || !props.length) return;
  const hasConcierge = props.some(p => p.conciergePct > 0);
  const colgroup = `<colgroup>
    <col style="width:180px;">
    <col style="width:70px;">
    <col style="width:70px;">
    <col style="width:110px;">
    <col style="width:110px;">
    ${hasConcierge ? '<col style="width:100px;"><col style="width:110px;">' : ''}
    <col style="width:90px;">
  </colgroup>`;
  const thead = `<thead><tr>
    <th style="text-align:left;">Logement</th>
    <th>Rés.</th><th>Nuits</th>
    <th>CA brut</th><th>Net</th>
    ${hasConcierge ? '<th>Concierg.</th><th>Propriét.</th>' : ''}
    <th>Taux occ.</th>
  </tr></thead>`;

  const tbody = `<tbody>${props.map(p => {
    const occ = p.occupancyRate || 0;
    const occCol = occ >= 70 ? '#1A7A5E' : occ >= 40 ? '#f59e0b' : '#9CA3AF';
    return `<tr>
      <td style="text-align:left;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:9px;height:9px;border-radius:50%;background:${p.color||'#10B981'};flex-shrink:0;"></div>
          <div>
            <div style="font-weight:600;font-size:13px;">${p.name}</div>
            <div style="font-size:11px;color:#9CA3AF;">${fmtN(p.bookings)} rés.</div>
          </div>
        </div>
      </td>
      <td>${fmtN(p.bookings)}</td>
      <td>${fmtN(p.nights)}</td>
      <td style="font-weight:600;">${fmt(p.grossRevenue)}</td>
      <td>${fmt(p.netRevenue)}</td>
      ${hasConcierge ? `<td class="${!p.conciergeAmount?'zero':''}">${p.conciergeAmount>0?fmt(p.conciergeAmount):'—'}</td><td style="font-weight:600;">${fmt(p.ownerRevenue)}</td>` : ''}
      <td><span class="occ-badge" style="background:${occCol}18;color:${occCol};">${occ}%</span></td>
    </tr>`;
  }).join('')}</tbody>`;

  document.getElementById('propTable').innerHTML = colgroup + thead + tbody;
}

function renderMonthlyTable(monthly, byProp) {
  const hasConcierge = byProp && byProp.some(p => p.conciergePct > 0);
  const colgroup = `<colgroup>
    <col style="width:90px;">
    <col style="width:70px;">
    <col style="width:70px;">
    <col style="width:110px;">
    <col style="width:100px;">
    <col style="width:110px;">
    <col style="width:110px;">
    ${hasConcierge ? '<col style="width:100px;"><col style="width:110px;">' : ''}
  </colgroup>`;
  const thead = `<thead><tr>
    <th style="text-align:left;">Mois</th><th>Rés.</th><th>Nuits</th>
    <th>CA brut</th><th>Ménage</th><th>Taxe séjour</th><th>Net</th>
    ${hasConcierge ? '<th>Concierg.</th><th>Propriét.</th>' : ''}
  </tr></thead>`;

  const tbody = `<tbody>${monthly.map(m => `<tr>
    <td>${m.label}</td>
    <td class="${!m.bookings?'zero':''}">${fmtN(m.bookings)}</td>
    <td class="${!m.nights?'zero':''}">${fmtN(m.nights)}</td>
    <td class="${!m.grossRevenue?'zero':''}">${m.grossRevenue>0?fmt(m.grossRevenue):'—'}</td>
    <td class="${!m.cleaningFee?'zero':''}">${m.cleaningFee>0?fmt(m.cleaningFee):'—'}</td>
    <td class="${!m.touristTax?'zero':''}">${m.touristTax>0?fmt(m.touristTax):'—'}</td>
    <td class="${!m.netRevenue?'zero':''}">${m.netRevenue>0?fmt(m.netRevenue):'—'}</td>
    ${hasConcierge ? `
      <td class="${!m.conciergeAmount?'zero':''}">${m.conciergeAmount>0?fmt(m.conciergeAmount):'—'}</td>
      <td class="${!m.ownerRevenue?'zero':''}">${m.ownerRevenue>0?fmt(m.ownerRevenue):'—'}</td>
    ` : ''}
  </tr>`).join('')}</tbody>`;

  const sum = k => monthly.reduce((s,m) => s+(m[k]||0), 0);
  const tfoot = `<tfoot><tr>
    <td>TOTAL</td>
    <td>${fmtN(sum('bookings'))}</td><td>${fmtN(sum('nights'))}</td>
    <td>${fmt(sum('grossRevenue'))}</td><td>${fmt(sum('cleaningFee'))}</td>
    <td>${fmt(sum('touristTax'))}</td><td>${fmt(sum('netRevenue'))}</td>
    ${hasConcierge ? `<td>${fmt(sum('conciergeAmount'))}</td><td>${fmt(sum('ownerRevenue'))}</td>` : ''}
  </tr></tfoot>`;

  document.getElementById('monthlyTable').innerHTML = colgroup + thead + tbody + tfoot;
}

// ── Exports ───────────────────────────────────────────────────
function exportCSV() {
  if (!_data) return;
  const hasConcierge = _data.byProperty?.some(p => p.conciergePct > 0);
  const headers = ['Mois','Réservations','Nuits','CA Brut','Frais Ménage','Taxe Séjour','Revenu Net'];
  if (hasConcierge) headers.push('Commission Conciergerie','Revenu Propriétaire');

  const rows = _data.monthly.map(m => {
    const r = [m.label, m.bookings, m.nights, m.grossRevenue, m.cleaningFee, m.touristTax, m.netRevenue];
    if (hasConcierge) r.push(m.conciergeAmount, m.ownerRevenue);
    return r;
  });
  const sum = k => _data.monthly.reduce((s,m)=>s+(m[k]||0),0);
  const total = ['TOTAL', sum('bookings'), sum('nights'), sum('grossRevenue'), sum('cleaningFee'), sum('touristTax'), sum('netRevenue')];
  if (hasConcierge) total.push(sum('conciergeAmount'), sum('ownerRevenue'));
  rows.push(total);

  dlCSV(`revenus_${_data.year}.csv`, headers, rows);
}

function exportConcierge() {
  if (!_data) return;
  const resas = (_data.reservations||[]).filter(r => r.conciergePct > 0);
  if (!resas.length) {
    alert('Aucune réservation avec commission conciergerie.\n\nConfigurez le % dans Mes logements → Commission conciergerie.');
    return;
  }
  const headers = ['Logement','Plateforme','Arrivée','Départ','Nuits','Prix brut','Frais ménage','Taxe séjour','Revenu net','% Conciergerie','Commission','Versé propriétaire'];
  const rows = resas.map(r => [r.propertyName, r.platform, r.startDate, r.endDate, r.nights, r.rawPrice, r.cleaningFee, r.touristTax, r.netRevenue, r.conciergePct+'%', r.conciergeAmount, r.ownerRevenue]);
  dlCSV(`conciergerie_${_data.year}.csv`, headers, rows);
}

function dlCSV(name, headers, rows) {
  const bom = '\uFEFF';
  const csv = bom + [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
  a.download = name; a.click();
}

// ── Export Comptable ──────────────────────────────────────────
function showExportComptaModal() {
  // Pré-remplir l'année avec l'année courante du rapport
  const yearSel = document.getElementById('exportYear');
  yearSel.innerHTML = '';
  const currentYear = new Date().getFullYear();
  for (let y = currentYear; y >= currentYear - 4; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    if (y === (parseInt(document.getElementById('yearSelect')?.value) || currentYear)) opt.selected = true;
    yearSel.appendChild(opt);
  }
  const modal = document.getElementById('exportComptaModal');
  modal.style.display = 'flex';
}

function closeExportComptaModal() {
  document.getElementById('exportComptaModal').style.display = 'none';
}

// Fermer en cliquant en dehors
document.getElementById('exportComptaModal').addEventListener('click', function(e) {
  if (e.target === this) closeExportComptaModal();
});

async function downloadExport(type) {
  const month = document.getElementById('exportMonth').value;
  const year  = document.getElementById('exportYear').value;
  const token = localStorage.getItem('lcc_token');

  let url = `/api/export/${type}?year=${year}`;
  if (month) url += `&month=${month}`;

  try {
    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error('Erreur serveur');

    const blob = await res.blob();
    const filename = res.headers.get('Content-Disposition')?.match(/filename="(.+?)"/)?.[1]
      || `boostinghost_${type}_${year}.csv`;

    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  } catch (err) {
    alert('Erreur lors du téléchargement. Réessayez.');
    console.error(err);
  }
}
</script>
